<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- Orange rounded background -->
  <rect width="60" height="60" rx="12" ry="12" fill="#FF5C00"/>

  <!-- Rentman triple-slash brand mark (three white parallelograms) -->
  <g fill="white">
    <!-- Left slash -->
    <polygon points="7,44 14,16 20,16 13,44"/>
    <!-- Middle slash -->
    <polygon points="15,44 22,16 28,16 21,44"/>
    <!-- Right slash -->
    <polygon points="23,44 30,16 36,16 29,44"/>
  </g>

  <!-- Power plug icon (top right) -->
  <g fill="white">
    <!-- Plug body -->
    <rect x="38" y="26" width="14" height="10" rx="2"/>
    <!-- Prong top -->
    <rect x="40" y="20" width="3.5" height="8" rx="1"/>
    <!-- Prong bottom -->
    <rect x="46.5" y="20" width="3.5" height="8" rx="1"/>
    <!-- Cable stub -->
    <rect x="41" y="36" width="8" height="3.5" rx="1"/>
  </g>
</svg>
